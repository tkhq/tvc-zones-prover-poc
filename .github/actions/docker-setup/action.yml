name: "Set up Docker"
description: "Ensure Docker is configured correctly"
inputs:
  dockerHub:
    description: "Docker Hub API key"
    required: false
  ghcr:
    description: "Github API key"
    required: false
runs:
  using: "composite"
  steps:
    - name: Setup and configure docker
      shell: 'script -q -e -c "bash {0}"'
      run: |
        [[ $EUID -ne 0 ]] && exec sudo /bin/sh "$0" "$@"
        docker version

        cat << EOF >/etc/docker/daemon.json
        {
          "features": {
          "containerd-snapshotter": true
          },
          "registry-mirrors": ["https://ghcr.io/tkhq"]
        }
        EOF

        systemctl restart docker
        docker buildx create --driver docker-container --bootstrap --name build --use

    - name: Login to Docker Hub
      if: ${{ inputs.dockerHub != '' }}
      shell: 'script -q -e -c "bash {0}"'
      # Login in to Dockerhub just to avoid being rate limited or shut down.
      # Public access to public images are needed for StageX builds, nothing else.
      run: |
        echo "${{ inputs.dockerHub }}" | docker login -u rno --password-stdin

    - name: Login to GHCR
      if: ${{ inputs.ghcr != '' }}
      shell: 'script -q -e -c "bash {0}"'
      run: |
        echo "${{ inputs.ghcr }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
